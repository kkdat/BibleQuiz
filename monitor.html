<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <title>Monitor - Bible Quiz Pro</title>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* Very light, clean gradient */
            background: radial-gradient(circle at top right, #fdfcfd, #e2e8f0);
            min-height: 100vh;
            color: #1e293b; /* Darker slate for general text */
        }

        .glass {
            /* Adjusted for light background: white with subtle shadow */
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        /* Specific colors for the Header */
        .text-balikatan {
            color: #7c3aed; /* Deep Purple */
        }
        .text-bible-quiz {
            color: #2563eb; /* Strong Blue */
        }

        @keyframes reveal-pop {
            0% { transform: scale(0.85) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .reveal-anim { 
            animation: reveal-pop 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        /* Custom scrollbar for light theme */
        #leaderboard::-webkit-scrollbar { width: 4px; }
        #leaderboard::-webkit-scrollbar-track { background: transparent; }
        #leaderboard::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="p-8 md:p-16 overflow-hidden">
    
    <div class="flex justify-between items-end mb-16 border-b border-slate-300 pb-10">
        <div>
            <h1 class="uppercase tracking-[0.4em] font-extrabold text-3xl">
                <span class="text-balikatan">Balikatan</span> 
                <span class="text-bible-quiz">Bible Quiz</span>
            </h1>
            <div class="flex items-center gap-3 mt-2">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-600"></span>
                </span>
                <p id="status-tag" class="text-slate-500 font-bold text-xs uppercase tracking-[0.2em]">Live Signal: Secure</p>
            </div>
        </div>
        <div class="glass px-6 py-3 rounded-2xl flex items-center gap-4">
            <span class="text-slate-500 text-xs font-bold uppercase tracking-widest">Global Status</span>
            <span class="text-emerald-600 font-black text-sm uppercase">Active</span>
        </div>
    </div>

    <div class="grid grid-cols-12 gap-16 h-[65vh] items-start">
        
        <div class="col-span-8 flex flex-col justify-center h-full relative pr-4">
            <div id="mon-pts" class="mb-6 text-xl text-blue-700 font-bold hidden uppercase tracking-[0.3em] bg-blue-100 w-fit px-5 py-1.5 rounded-full border border-blue-200">
                0 POINTS
            </div>
            
            <div id="mon-q" class="text-6xl md:text-7xl font-extrabold leading-[1.15] text-slate-900 transition-all duration-700 ease-out">
                Ready for the next Question...
            </div>
            
            <div id="mon-ans-container" class="absolute inset-0 glass bg-white/90 hidden flex-col items-center justify-center text-center p-12 rounded-[3rem] border-blue-200 reveal-anim z-20 shadow-2xl">
                <span class="text-emerald-600 font-bold tracking-[0.4em] uppercase text-sm mb-6 bg-emerald-50 px-4 py-1 rounded-full border border-emerald-200">Correct Revelation</span>
                <div id="mon-ans-text" class="text-7xl md:text-9xl font-black text-slate-900 uppercase tracking-tight">
                    ---
                </div>
            </div>
        </div>
        
        <div class="col-span-4 h-full flex flex-col">
            <div class="glass rounded-[2rem] p-8 h-full flex flex-col">
                <h2 class="text-slate-800 uppercase tracking-widest font-extrabold mb-8 text-sm flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-600 rounded-full"></span> Top Contenders
                </h2>
                
                <div id="leaderboard" class="space-y-8 overflow-y-auto pr-4 flex-grow">
                    <div class="animate-pulse space-y-4">
                        <div class="h-8 bg-slate-200 rounded-lg w-3/4"></div>
                        <div class="h-8 bg-slate-200 rounded-lg w-1/2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOw4fhoiz3QwwrcwczQauBjkvcLaUTlIqtKsNDppU1rIhjLwM1u4apqjuhq3xSqtTq/exec";

        async function sync() {
            try {
                const res = await fetch(`${SCRIPT_URL}?cb=${Date.now()}`);
                const data = await res.json();
                
                const qEl = document.getElementById('mon-q');
                const pEl = document.getElementById('mon-pts');
                const ansContainer = document.getElementById('mon-ans-container');
                const ansText = document.getElementById('mon-ans-text');
                const lbContainer = document.getElementById('leaderboard');

                if(data.status === "ACTIVE") {
                    qEl.innerText = data.question;
                    pEl.innerText = data.points + " POINTS";
                    pEl.classList.remove('hidden');
                    qEl.style.opacity = "1";

                    if(data.reveal === true || data.reveal === "true") {
                        ansText.innerText = data.answer;
                        ansContainer.classList.remove('hidden');
                        ansContainer.classList.add('flex');
                    } else {
                        ansContainer.classList.replace('flex', 'hidden');
                    }
                } else {
                    qEl.innerText = "Ready for the next Question...";
                    qEl.style.opacity = "0.3";
                    pEl.classList.add('hidden');
                    ansContainer.classList.add('hidden');
                    ansContainer.classList.remove('flex');
                }

                if (data.players && data.players.length > 0) {
                    const sortedPlayers = data.players.sort((a, b) => b.score - a.score);
                    const maxScore = Math.max(...sortedPlayers.map(p => p.score), 1);

                    lbContainer.innerHTML = sortedPlayers.map((player, idx) => `
                        <div class="space-y-3 group">
                            <div class="flex justify-between items-end">
                                <div class="flex items-center gap-3">
                                    <span class="text-xs font-bold text-slate-400">0${idx + 1}</span>
                                    <span class="font-bold text-xl uppercase tracking-tighter text-slate-800">${player.name}</span>
                                </div>
                                <span class="text-blue-600 font-mono font-bold text-lg">${player.score.toLocaleString()}</span>
                            </div>
                            <div class="h-1.5 bg-slate-200 rounded-full overflow-hidden">
                                <div class="h-full bg-gradient-to-r from-blue-600 to-indigo-500 transition-all duration-1000" 
                                     style="width: ${(player.score / maxScore) * 100}%"></div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch(e) {
                console.error("Monitor Sync Error:", e);
            }
        }

        setInterval(sync, 1250);
        sync();
    </script>
</body>
</html>
