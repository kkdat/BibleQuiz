<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Monitor - Bible Quiz</title>
</head>
<body class="bg-black text-white p-12 overflow-hidden">
    <div class="grid grid-cols-12 gap-12 h-[80vh] items-center">
        <div class="col-span-8 flex flex-col justify-center pr-10 border-r-4 border-slate-900">
            <h1 class="text-yellow-500 uppercase tracking-widest font-black mb-6">Current Question</h1>
            <div id="mon-q" class="text-7xl font-black leading-tight">Waiting for Admin...</div>
            <div id="mon-pts" class="mt-8 text-4xl text-yellow-500 font-bold hidden">0 POINTS</div>
        </div>
        
        <div class="col-span-4 flex flex-col">
            <h1 class="text-blue-500 uppercase tracking-widest font-black mb-10 text-xl border-b-2 border-blue-900 pb-4">Rankings</h1>
            <div id="leaderboard" class="space-y-6">
                <p class="text-slate-500 italic">No scores yet...</p>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxozOjSYAFFeLAdDkN7eriwoJ1EW1ylILNKGDDq1xplomnwWNmwTRm419d5sd6djoKB/exec";

        async function sync() {
            try {
                const res = await fetch(`${SCRIPT_URL}?cb=${Date.now()}`);
                const data = await res.json();
                if(data.status === "ACTIVE") {
                    document.getElementById('mon-q').innerText = data.question;
                    document.getElementById('mon-pts').innerText = data.points + " POINTS";
                    document.getElementById('mon-pts').classList.remove('hidden');
                } else {
                    document.getElementById('mon-q').innerText = "Ready for the next Box...";
                    document.getElementById('mon-pts').classList.add('hidden');
                }
            } catch(e) {}
        }
        setInterval(sync, 2500);
    </script>
</body>
</html>
