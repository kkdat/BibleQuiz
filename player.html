<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Score Counter - Bible Quiz</title>
</head>
<body class="bg-slate-900 text-white min-h-screen p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-end mb-12 border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-4xl font-black text-yellow-500 tracking-tight">SCORE CONTROL</h1>
                <p class="text-slate-400 font-mono text-sm uppercase tracking-widest mt-1">Manual Points Override</p>
            </div>
            <div class="text-right">
                <p id="status-text" class="text-xs font-bold text-slate-500 uppercase mb-2">System Ready</p>
                <button onclick="fetchAllScores()" class="bg-slate-800 hover:bg-slate-700 px-6 py-2 rounded-full border border-slate-600 transition text-sm font-bold active:scale-95">
                    REFRESH DATA
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <div class="bg-slate-800 rounded-3xl p-6 border-2 border-slate-700 shadow-xl text-center transition-all hover:border-yellow-500/50">
                <h2 class="text-xl font-black text-slate-400 mb-4 uppercase tracking-tighter">Team 1</h2>
                <div id="score-TEAM 1" class="text-7xl font-black text-white mb-6">0</div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="modifyScore('TEAM 1', 10)" class="bg-green-600 hover:bg-green-500 py-3 rounded-xl font-black shadow-lg transition-all active:scale-90">+10</button>
                    <button onclick="modifyScore('TEAM 1', -10)" class="bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white py-3 rounded-xl font-black transition-all active:scale-90">-10</button>
                    <button onclick="modifyScore('TEAM 1', 50)" class="col-span-2 bg-yellow-500 hover:bg-yellow-400 text-slate-900 py-3 rounded-xl font-black shadow-lg transition-all active:scale-95">INSTANT +50</button>
                </div>
            </div>

            <div class="bg-slate-800 rounded-3xl p-6 border-2 border-slate-700 shadow-xl text-center transition-all hover:border-yellow-500/50">
                <h2 class="text-xl font-black text-slate-400 mb-4 uppercase tracking-tighter">Team 2</h2>
                <div id="score-TEAM 2" class="text-7xl font-black text-white mb-6">0</div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="modifyScore('TEAM 2', 10)" class="bg-green-600 hover:bg-green-500 py-3 rounded-xl font-black shadow-lg transition-all active:scale-90">+10</button>
                    <button onclick="modifyScore('TEAM 2', -10)" class="bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white py-3 rounded-xl font-black transition-all active:scale-90">-10</button>
                    <button onclick="modifyScore('TEAM 2', 50)" class="col-span-2 bg-yellow-500 hover:bg-yellow-400 text-slate-900 py-3 rounded-xl font-black shadow-lg transition-all active:scale-95">INSTANT +50</button>
                </div>
            </div>

            <div class="bg-slate-800 rounded-3xl p-6 border-2 border-slate-700 shadow-xl text-center transition-all hover:border-yellow-500/50">
                <h2 class="text-xl font-black text-slate-400 mb-4 uppercase tracking-tighter">Team 3</h2>
                <div id="score-TEAM 3" class="text-7xl font-black text-white mb-6">0</div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="modifyScore('TEAM 3', 10)" class="bg-green-600 hover:bg-green-500 py-3 rounded-xl font-black shadow-lg transition-all active:scale-90">+10</button>
                    <button onclick="modifyScore('TEAM 3', -10)" class="bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white py-3 rounded-xl font-black transition-all active:scale-90">-10</button>
                    <button onclick="modifyScore('TEAM 3', 50)" class="col-span-2 bg-yellow-500 hover:bg-yellow-400 text-slate-900 py-3 rounded-xl font-black shadow-lg transition-all active:scale-95">INSTANT +50</button>
                </div>
            </div>

            <div class="bg-slate-800 rounded-3xl p-6 border-2 border-slate-700 shadow-xl text-center transition-all hover:border-yellow-500/50">
                <h2 class="text-xl font-black text-slate-400 mb-4 uppercase tracking-tighter">Team 4</h2>
                <div id="score-TEAM 4" class="text-7xl font-black text-white mb-6">0</div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="modifyScore('TEAM 4', 10)" class="bg-green-600 hover:bg-green-500 py-3 rounded-xl font-black shadow-lg transition-all active:scale-90">+10</button>
                    <button onclick="modifyScore('TEAM 4', -10)" class="bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white py-3 rounded-xl font-black transition-all active:scale-90">-10</button>
                    <button onclick="modifyScore('TEAM 4', 50)" class="col-span-2 bg-yellow-500 hover:bg-yellow-400 text-slate-900 py-3 rounded-xl font-black shadow-lg transition-all active:scale-95">INSTANT +50</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyXkLDi63XErALlnkB8_QMBArIY-iu30c2MznQqRdChgXaSDZRBeeq72DpqCC7Qh5nl/exec"; 

        // Initial Load
        window.onload = fetchAllScores;

        async function fetchAllScores() {
            document.getElementById('status-text').innerText = "Syncing...";
            try {
                const res = await fetch(`${SCRIPT_URL}?cb=${Date.now()}`);
                const data = await res.json();
                
                // Update local UI based on data from "Players" sheet
                data.players.forEach(p => {
                    const el = document.getElementById(`score-${p.name}`);
                    if (el) el.innerText = p.score;
                });
                document.getElementById('status-text').innerText = "Updated";
            } catch (e) {
                document.getElementById('status-text').innerText = "Sync Error";
                console.error(e);
            }
        }

        async function modifyScore(teamName, points) {
            // 1. Update UI Immediately (Optimistic update)
            const el = document.getElementById(`score-${teamName}`);
            let current = parseInt(el.innerText);
            el.innerText = current + points;
            
            document.getElementById('status-text').innerText = "Pushing...";

            // 2. Send to Google Sheets
            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({
                        action: "submitScore",
                        user: teamName,
                        points: points
                    })
                });
                document.getElementById('status-text').innerText = "Saved to Sheet";
            } catch (e) {
                alert("Failed to update sheet. Please refresh.");
                fetchAllScores(); // Revert to actual data
            }
        }
    </script>
</body>
</html>
