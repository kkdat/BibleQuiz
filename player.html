<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">
    
    <div id="reg" class="bg-white p-8 rounded-xl text-black w-80">
        <h2 class="text-xl font-bold mb-4">Register</h2>
        <input id="user" type="text" placeholder="Username" class="w-full border p-2 mb-2">
        <input id="pass" type="password" placeholder="Passcode" class="w-full border p-2 mb-4">
        <button onclick="register()" class="w-full bg-blue-600 text-white py-2 rounded">Join Quiz</button>
    </div>

    <div id="wait" class="hidden text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-yellow-500 mx-auto mb-4"></div>
        <p class="text-xl">Waiting for next question...</p>
    </div>

    <div id="game" class="hidden w-full max-w-md p-6">
        <div id="timer" class="text-4xl font-bold text-red-500 mb-4">0s</div>
        <h2 id="q-text" class="text-2xl mb-6"></h2>
        <div id="choices" class="grid gap-3"></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyoOT-6CEchAumFG4HpwgL045HMj022-h_k1W15V-WbTx8Czvlo2YiMWqlBJB3QAE8F/exec";
        let lastQ = "";

        async function register() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({action: "register", user, pass}) });
            document.getElementById('reg').classList.add('hidden');
            document.getElementById('wait').classList.remove('hidden');
            setInterval(poll, 3000);
        }

        async function poll() {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            if (data.status === "ACTIVE" && data.question !== lastQ) {
                lastQ = data.question;
                showQuestion(data);
            }
        }

        function showQuestion(data) {
            document.getElementById('wait').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            document.getElementById('q-text').innerText = data.question;
            let time = data.timer;
            const tDiv = document.getElementById('timer');
            const interval = setInterval(() => {
                time--;
                tDiv.innerText = time + "s";
                if(time <= 0) {
                    clearInterval(interval);
                    resetToWait();
                }
            }, 1000);

            const options = data.choices.split(",");
            document.getElementById('choices').innerHTML = options.map(opt => 
                `<button onclick="resetToWait()" class="bg-slate-700 p-4 rounded hover:bg-yellow-600">${opt}</button>`
            ).join('');
        }

        function resetToWait() {
            document.getElementById('game').classList.add('hidden');
            document.getElementById('wait').classList.remove('hidden');
        }
    </script>
</body>
</html>
