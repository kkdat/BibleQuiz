<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Control Panel - Bible Quiz</title>
</head>
<body class="bg-slate-900 text-white min-h-screen p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-end mb-12 border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-4xl font-black text-yellow-500 tracking-tight">SCORE CONTROL</h1>
                <p class="text-slate-400 font-mono text-sm uppercase tracking-widest mt-1">Live Monitor Sync Active</p>
            </div>
            <div class="text-right">
                <div class="flex items-center gap-2 justify-end mb-2">
                    <div id="sync-indicator" class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <p id="status-text" class="text-xs font-bold text-slate-500 uppercase">Synced with Sheet</p>
                </div>
                <button onclick="fetchLatestFromSheet()" class="bg-slate-800 hover:bg-slate-700 px-6 py-2 rounded-full border border-slate-600 transition text-sm font-bold active:scale-95">
                    FORCE REFRESH
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <div class="bg-slate-800 rounded-3xl p-6 border-2 border-slate-700 shadow-xl text-center transition-all hover:border-yellow-500">
                <h2 class="text-xl font-black text-slate-400 mb-4 uppercase tracking-tighter">Team 1</h2>
                <div id="score-TEAM 1" class="text-7xl font-black text-white mb-6">0</div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="pushUpdate('TEAM 1', 10)" class="bg-green-600 hover:bg-green-500 py-3 rounded-xl font-black shadow-lg transition-all active:scale-90">+10</button>
                    <button onclick="pushUpdate('TEAM 1', -10)" class="bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white py-3 rounded-xl font-black transition-all active:scale-90">-10</button>
                    <button onclick="pushUpdate('TEAM 1', 50)" class="col-span-2 bg-yellow-500 hover:bg-yellow-400 text-slate-900 py-3 rounded-xl font-black shadow-lg transition-all active:scale-95">BONUS +50</button>
                </div>
            </div>

            <div class="bg-slate-800 rounded-3xl p-6 border-2 border-slate-700 shadow-xl text-center transition-all hover:border-yellow-500">
                <h2 class="text-xl font-black text-slate-400 mb-4 uppercase tracking-tighter">Team 2</h2>
                <div id="score-TEAM 2" class="text-7xl font-black text-white mb-6">0</div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="pushUpdate('TEAM 2', 10)" class="bg-green-600 hover:bg-green-500 py-3 rounded-xl font-black shadow-lg transition-all active:scale-90">+10</button>
                    <button onclick="pushUpdate('TEAM 2', -10)" class="bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white py-3 rounded-xl font-black transition-all active:scale-90">-10</button>
                    <button onclick="pushUpdate('TEAM 2', 50)" class="col-span-2 bg-yellow-500 hover:bg-yellow-400 text-slate-900 py-3 rounded-xl font-black shadow-lg transition-all active:scale-95">BONUS +50</button>
                </div>
            </div>

            <div class="bg-slate-800 rounded-3xl p-6 border-2 border-slate-700 shadow-xl text-center transition-all hover:border-yellow-500">
                <h2 class="text-xl font-black text-slate-400 mb-4 uppercase tracking-tighter">Team 3</h2>
                <div id="score-TEAM 3" class="text-7xl font-black text-white mb-6">0</div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="pushUpdate('TEAM 3', 10)" class="bg-green-600 hover:bg-green-500 py-3 rounded-xl font-black shadow-lg transition-all active:scale-90">+10</button>
                    <button onclick="pushUpdate('TEAM 3', -10)" class="bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white py-3 rounded-xl font-black transition-all active:scale-90">-10</button>
                    <button onclick="pushUpdate('TEAM 3', 50)" class="col-span-2 bg-yellow-500 hover:bg-yellow-400 text-slate-900 py-3 rounded-xl font-black shadow-lg transition-all active:scale-95">BONUS +50</button>
                </div>
            </div>

            <div class="bg-slate-800 rounded-3xl p-6 border-2 border-slate-700 shadow-xl text-center transition-all hover:border-yellow-500">
                <h2 class="text-xl font-black text-slate-400 mb-4 uppercase tracking-tighter">Team 4</h2>
                <div id="score-TEAM 4" class="text-7xl font-black text-white mb-6">0</div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="pushUpdate('TEAM 4', 10)" class="bg-green-600 hover:bg-green-500 py-3 rounded-xl font-black shadow-lg transition-all active:scale-90">+10</button>
                    <button onclick="pushUpdate('TEAM 4', -10)" class="bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white py-3 rounded-xl font-black transition-all active:scale-90">-10</button>
                    <button onclick="pushUpdate('TEAM 4', 50)" class="col-span-2 bg-yellow-500 hover:bg-yellow-400 text-slate-900 py-3 rounded-xl font-black shadow-lg transition-all active:scale-95">BONUS +50</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyXkLDi63XErALlnkB8_QMBArIY-iu30c2MznQqRdChgXaSDZRBeeq72DpqCC7Qh5nl/exec"; 

        // Initial Load and Auto-Polling (keeps UI synced with monitor)
        window.onload = () => {
            fetchLatestFromSheet();
            setInterval(fetchLatestFromSheet, 5000); // Polling every 5 seconds
        };

        async function fetchLatestFromSheet() {
            try {
                const res = await fetch(`${SCRIPT_URL}?cb=${Date.now()}`);
                const data = await res.json();
                
                data.players.forEach(p => {
                    const el = document.getElementById(`score-${p.name}`);
                    if (el) el.innerText = p.score;
                });
                
                updateStatus("Synced", "bg-green-500");
            } catch (e) {
                updateStatus("Offline", "bg-red-500");
            }
        }

        async function pushUpdate(teamName, points) {
            // Update UI immediately (Optimistic)
            const el = document.getElementById(`score-${teamName}`);
            el.innerText = parseInt(el.innerText) + points;
            
            updateStatus("Updating...", "bg-yellow-500");

            try {
                // Send post to update the actual sheet
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({
                        action: "submitScore",
                        user: teamName,
                        points: points
                    })
                });
                updateStatus("Synced", "bg-green-500");
            } catch (e) {
                alert("Error pushing score. Refreshing...");
                fetchLatestFromSheet();
            }
        }

        function updateStatus(text, colorClass) {
            const status = document.getElementById('status-text');
            const indicator = document.getElementById('sync-indicator');
            status.innerText = text;
            indicator.className = `w-2 h-2 rounded-full animate-pulse ${colorClass}`;
        }
    </script>
</body>
</html>
