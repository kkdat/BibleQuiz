<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quiz - Player Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #eab308;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div id="reg-modal" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
        <div class="bg-white text-slate-900 p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6 text-center">Player Registry</h2>
            <input type="text" id="username" placeholder="Username" class="w-full mb-4 p-3 border rounded-lg focus:ring-2 focus:ring-yellow-500 outline-none">
            <input type="password" id="passcode" placeholder="Passcode" class="w-full mb-6 p-3 border rounded-lg focus:ring-2 focus:ring-yellow-500 outline-none">
            <button onclick="handleRegister()" class="w-full bg-yellow-500 text-white font-bold py-3 rounded-lg hover:bg-yellow-600 transition">Enter Arena</button>
        </div>
    </div>

    <div id="waiting-area" class="hidden text-center">
        <div class="loader mx-auto mb-4"></div>
        <h2 class="text-2xl font-semibold text-yellow-500">Waiting for Admin...</h2>
        <p class="text-slate-400 mt-2">The next question will appear automatically.</p>
    </div>

    <div id="question-area" class="hidden w-full max-w-2xl">
        <div class="flex justify-between items-center mb-6">
            <span id="timer" class="text-3xl font-mono font-bold text-red-500 bg-red-500/10 px-4 py-1 rounded-full">30s</span>
            <span id="points-tag" class="bg-yellow-500/20 text-yellow-500 px-4 py-1 rounded-full font-bold">50 PTS</span>
        </div>
        <h2 id="display-q" class="text-3xl font-bold mb-8 leading-tight"></h2>
        <div id="choices-grid" class="grid grid-cols-1 gap-4">
            </div>
    </div>

    <script>
        let currentUser = "";
        let timerInterval;

        function handleRegister() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('passcode').value;
            if(user && pass) {
                currentUser = user;
                document.getElementById('reg-modal').classList.add('hidden');
                document.getElementById('waiting-area').classList.remove('hidden');
                startPolling(); // Start looking for questions
            }
        }

        function startPolling() {
            // In a real setup, you'd use google.script.run.checkActiveQuestion()
            // Simulating a delay of 5 seconds before Admin "pushes" the question
            setTimeout(revealQuestion, 5000);
        }

        function revealQuestion() {
            const mockData = {
                question: "Who was the first king of Israel?",
                points: 100,
                choices: ["David", "Saul", "Solomon", "Samuel"],
                time: 15
            };

            document.getElementById('waiting-area').classList.add('hidden');
            document.getElementById('question-area').classList.remove('hidden');
            
            document.getElementById('display-q').innerText = mockData.question;
            document.getElementById('points-tag').innerText = `${mockData.points} PTS`;
            
            const grid = document.getElementById('choices-grid');
            grid.innerHTML = mockData.choices.map(choice => `
                <button onclick="submitAnswer('${choice}')" class="bg-slate-800 border-2 border-slate-700 p-4 rounded-xl text-left hover:border-yellow-500 hover:bg-slate-700 transition font-medium">
                    ${choice}
                </button>
            `).join('');

            startTimer(mockData.time);
        }

        function startTimer(seconds) {
            let timeLeft = seconds;
            const timerEl = document.getElementById('timer');
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = `${timeLeft}s`;
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    disableButtons();
                    alert("Time is up!");
                }
            }, 1000);
        }

        function submitAnswer(answer) {
            clearInterval(timerInterval);
            disableButtons();
            alert(`Answer "${answer}" submitted!`);
            // Logic to send answer to Google Sheets goes here
            document.getElementById('question-area').classList.add('hidden');
            document.getElementById('waiting-area').classList.remove('hidden');
            startPolling(); // Go back to waiting for next question
        }

        function disableButtons() {
            const btns = document.querySelectorAll('#choices-grid button');
            btns.forEach(b => b.disabled = true);
        }
    </script>
</body>
</html>
