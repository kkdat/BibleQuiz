<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Admin - Bible Quiz</title>
</head>
<body class="bg-slate-900 text-white p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold text-yellow-500">Briefcase Control Panel</h1>
            </div>
        
        <div id="grid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white text-slate-900 p-8 rounded-2xl max-w-md w-full text-center shadow-2xl border-4 border-yellow-500">
            
            <div id="m-timer" class="text-6xl font-black text-red-600 mb-4 tabular-nums">0s</div>
            
            <div id="m-pts" class="text-4xl font-black text-yellow-600 mb-2 underline">0</div>
            <p id="m-que" class="text-xl font-bold mb-6 italic leading-tight"></p>
            
            <div id="answer-box" class="mb-6 hidden">
                <p class="text-xs text-slate-400 uppercase tracking-widest">Correct Answer:</p>
                <p id="m-ans" class="text-2xl font-black text-green-600 uppercase"></p>
                
                <button onclick="resetSystem()" class="mt-6 w-full bg-red-600 hover:bg-red-700 text-white px-4 py-3 rounded-xl font-bold transition shadow-lg active:scale-95">
                    RESET MONITOR & CLOSE
                </button>
            </div>
            
            <button id="pushBtn" onclick="pushToLive()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-green-700 transition-all active:scale-95">DISPLAY TO MONITOR</button>
            
            <button id="revealBtn" onclick="revealAnswer()" class="w-full mt-2 bg-yellow-500 text-slate-900 py-4 rounded-xl font-bold shadow-lg hover:bg-yellow-400 transition-all hidden animate-bounce">SHOW CORRECT ANSWER</button>
            
            <button onclick="closeModal()" class="mt-6 text-slate-400 hover:text-red-600 font-bold uppercase tracking-widest text-xs block w-full border-t pt-4">Close Control</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOw4fhoiz3QwwrcwczQauBjkvcLaUTlIqtKsNDppU1rIhjLwM1u4apqjuhq3xSqtTq/exec"; 
        let activeQ = null;
        let countdownInterval = null;
        let timeLeft = 0;

        const questions = [
            { id: 1, p: 50, q: "Who was swallowed by a great fish?", ans: "Jonah", t: 10 },
            { id: 2, p: 50, q: "How many days did it rain during the Great Flood?", ans: "40", t: 10 },
            { id: 3, p: 75, q: "What was the first book of the Bible?", ans: "Genesis", t: 10 },
            { id: 4, p: 75, q: "Who received the Ten Commandments?", ans: "Moses", t:10 },
            { id: 5, p: 100, q: "What did David use to defeat Goliath?", ans: "Slingshot", t: 10 },
            { id: 6, p: 100, q: "How many disciples did Jesus have?", ans: "12", t: 10 },
            { id: 7, p: 150, q: "Who was the oldest man in the Bible?", ans: "Methuselah", t: 10 },
            { id: 8, p: 150, q: "What was the secret to Samson's strength?", ans: "His hair", t: 10 },
            { id: 9, p: 200, q: "Which city's walls fell after Israel marched around it?", ans: "Jericho", t: 10 },
            { id: 10, p: 200, q: "What did God use to lead the Israelites by night?", ans: "A pillar of fire", t: 10 },
            { id: 11, p: 250, q: "Who was known as the 'Dreamer'?", ans: "Joseph", t: 10 },
            { id: 12, p: 250, q: "What is the shortest verse in the Bible?", ans: "Jesus wept", t: 10 },
            { id: 13, p: 250, q: "Which apostle was a tax collector?", ans: "Matthew", t: 10 },
            { id: 14, p: 300, q: "What was the first miracle performed by Jesus?", ans: "Water to wine", t: 10 },
            { id: 15, p: 300, q: "How many plagues did God send upon Egypt?", ans: "10", t: 10 },
            { id: 16, p: 400, q: "Who wrote the most books in the New Testament?", ans: "Paul", t: 10 },
            { id: 17, p: 400, q: "On what island was John when he wrote Revelation?", ans: "Patmos", t: 10 },
            { id: 18, p: 500, q: "Who was the first King of Israel?", ans: "Saul", t: 10 },
            { id: 19, p: 500, q: "What was the name of the mountain where Moses died?", ans: "Nebo", t: 10 },
            { id: 20, p: 500, q: "Which tribe was responsible for the Tabernacle?", ans: "Levi", t: 10 }
        ];

        const grid = document.getElementById('grid');
        questions.forEach(item => {
            const btn = document.createElement('div');
            btn.className = "bg-slate-800 border-2 border-yellow-700/30 p-6 rounded-xl cursor-pointer hover:border-yellow-400 hover:bg-slate-700 transition text-center font-bold text-yellow-500 shadow-lg";
            btn.innerHTML = `<span class="text-3xl">💼</span><br>Box ${item.id}`;
            btn.onclick = () => {
                activeQ = item;
                timeLeft = item.t;
                
                document.getElementById('m-timer').innerText = timeLeft + "s";
                document.getElementById('m-timer').classList.remove('animate-pulse', 'text-slate-400');
                document.getElementById('m-timer').classList.add('text-red-600');
                document.getElementById('m-pts').innerText = item.p;
                document.getElementById('m-que').innerText = item.q;
                document.getElementById('m-ans').innerText = item.ans;
                
                document.getElementById('answer-box').classList.add('hidden');
                document.getElementById('revealBtn').classList.add('hidden');
                document.getElementById('pushBtn').classList.remove('hidden');
                
                document.getElementById('modal').classList.remove('hidden');
                clearInterval(countdownInterval);
            };
            grid.appendChild(btn);
        });

        async function pushToLive() {
            const btn = document.getElementById('pushBtn');
            btn.innerText = "PUSHING..."; btn.disabled = true;
            
            await fetch(SCRIPT_URL, {
                method: "POST", 
                mode: "no-cors",
                body: JSON.stringify({ 
                    action: "pushQuestion", 
                    q: activeQ.q, 
                    p: activeQ.p, 
                    t: activeQ.t, 
                    ans: activeQ.ans,
                    reveal: false 
                })
            });
            
            btn.innerText = "LIVE ON MONITOR ✅";
            btn.classList.replace('bg-green-600', 'bg-blue-600');
            startTimer();
        }

        function startTimer() {
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    document.getElementById('m-timer').innerText = timeLeft + "s";
                    if (timeLeft <= 5) document.getElementById('m-timer').classList.add('animate-pulse');
                } else {
                    clearInterval(countdownInterval);
                    document.getElementById('m-timer').innerText = "TIME UP!";
                    document.getElementById('m-timer').classList.replace('text-red-600', 'text-slate-400');
                    
                    document.getElementById('revealBtn').classList.remove('hidden');
                    document.getElementById('pushBtn').classList.add('hidden');
                }
            }, 1000);
        }

        async function revealAnswer() {
            document.getElementById('answer-box').classList.remove('hidden');
            document.getElementById('revealBtn').classList.add('hidden');

            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ 
                    action: "revealAnswer", 
                    reveal: true 
                })
            });
        }

        async function resetSystem() {
            if(!confirm("Clear Monitor and prepare for next box?")) return;
            
            // Send reset to Sheet
            await fetch(SCRIPT_URL, { 
                method: "POST", 
                mode: "no-cors", 
                body: JSON.stringify({ action: "reset" }) 
            });

            // Automatically close the modal after reset
            closeModal();
        }

        function closeModal() { 
            document.getElementById('modal').classList.add('hidden'); 
            clearInterval(countdownInterval);
            const btn = document.getElementById('pushBtn');
            btn.classList.remove('bg-blue-600');
            btn.classList.add('bg-green-600');
            btn.innerText = "DISPLAY TO MONITOR";
            btn.disabled = false;
        }
    </script>
</body>
</html>
