<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-10">
    <h1 class="text-3xl font-bold mb-8 text-yellow-500">Quiz Control Center</h1>
    <div id="grid" class="grid grid-cols-5 gap-4"></div>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center">
        <div class="bg-white text-black p-8 rounded-xl max-w-lg w-full text-center">
            <h2 id="m-pts" class="text-4xl font-black mb-4"></h2>
            <p id="m-que" class="text-xl mb-6"></p>
            <button onclick="pushToLive()" class="bg-green-600 text-white px-6 py-3 rounded-lg font-bold">DISPLAY TO MONITOR</button>
            <button onclick="closeModal()" class="block mx-auto mt-4 text-gray-500">Cancel</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyoOT-6CEchAumFG4HpwgL045HMj022-h_k1W15V-WbTx8Czvlo2YiMWqlBJB3QAE8F/exec";
        let currentQ = {};

        const questions = Array.from({length: 20}, (_, i) => ({
            id: i+1, pts: (i+1)*50, q: `Question about Bible topic ${i+1}?`, c: "A,B,C,D", t: 20
        }));

        const grid = document.getElementById('grid');
        questions.forEach(q => {
            const box = document.createElement('div');
            box.className = "h-24 bg-slate-800 border-2 border-yellow-700 flex items-center justify-center cursor-pointer hover:bg-yellow-700 transition rounded";
            box.innerHTML = `💼 ${q.id}`;
            box.onclick = () => showBox(q);
            grid.appendChild(box);
        });

        function showBox(q) {
            currentQ = q;
            document.getElementById('m-pts').innerText = q.pts + " PTS";
            document.getElementById('m-que').innerText = q.q;
            document.getElementById('modal').classList.remove('hidden');
        }

        async function pushToLive() {
            await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "pushQuestion", q: currentQ.q, p: currentQ.pts, c: currentQ.c, t: currentQ.t })
            });
            alert("Question Live!");
            document.getElementById('modal').classList.add('hidden');
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
