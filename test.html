<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Control - Bible Quiz Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #020617);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .team-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .team-card:hover {
            transform: translateY(-5px);
            border-color: rgba(167, 139, 250, 0.4);
            background: rgba(255, 255, 255, 0.07);
        }

        .score-glow {
            text-shadow: 0 0 20px rgba(129, 140, 248, 0.5);
        }

        .btn-action {
            transition: all 0.2s active:scale-95;
        }

        /* Animated background pulse */
        .bg-glow {
            position: fixed;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            top: -10vw;
            right: -10vw;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes success-flash {
            0% { background-color: rgba(16, 185, 129, 0); }
            50% { background-color: rgba(16, 185, 129, 0.2); }
            100% { background-color: rgba(16, 185, 129, 0); }
        }
        .flash-success { animation: success-flash 0.4s ease-out; }
    </style>
</head>
<body class="text-slate-100 antialiased">
    <div class="bg-glow"></div>

    <div class="max-w-7xl mx-auto px-4 py-8 md:py-12">
        <header class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6 border-b border-white/10 pb-8">
            <div>
                <h1 class="text-4xl md:text-5xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400">
                    Score Central
                </h1>
                <div class="flex items-center gap-3 mt-3 bg-white/5 w-fit px-4 py-1.5 rounded-full border border-white/5">
                    <div id="sync-indicator" class="w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.6)]"></div>
                    <p id="status-text" class="text-[11px] font-bold text-slate-300 uppercase tracking-[0.2em]">Live Sync Active</p>
                </div>
            </div>
            
            <div class="flex gap-3">
                <button onclick="fetchLatestFromSheet()" class="glass-panel px-6 py-2.5 rounded-xl text-xs font-bold hover:bg-white/10 transition-all flex items-center gap-2">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                    REFRESH
                </button>
                <button onclick="resetAllScores()" class="bg-red-500/10 border border-red-500/20 px-6 py-2.5 rounded-xl text-xs font-bold text-red-400 hover:bg-red-500 hover:text-white transition-all">
                    RESET ALL
                </button>
            </div>
        </header>

        <div id="teams-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwF9VR8YQ2UehcXHf-tZWaZDI0HdCCLF4r-x1s5fzH-D8qaVJPj6v21rr7HMViu6hNK/exec";
        const teams = ["TEAM 1", "TEAM 2", "TEAM 3", "TEAM 4"];
        const points = [50, 100, 200, 500];

        // Initialize UI
        const container = document.getElementById('teams-container');
        teams.forEach(team => {
            container.innerHTML += `
                <div id="card-${team}" class="glass-panel team-card rounded-[2.5rem] p-8 flex flex-col items-center">
                    <span class="text-[11px] font-black text-indigo-400 tracking-[0.3em] uppercase mb-2">${team}</span>
                    <div id="score-${team}" class="text-6xl font-black text-white mb-8 score-glow tabular-nums">0</div>
                    
                    <div class="grid grid-cols-2 gap-3 w-full mb-6">
                        ${points.map(pt => `
                            <button onclick="pushUpdate('${team}', ${pt})" class="bg-white/5 hover:bg-emerald-500 text-white text-[11px] font-bold py-3 rounded-2xl transition-all border border-white/5 hover:border-emerald-400 active:scale-90">
                                +${pt}
                            </button>
                        `).join('')}
                    </div>
                    
                    <div class="w-full space-y-3 pt-6 border-t border-white/10">
                        <button onclick="pushUpdate('${team}', 20)" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3.5 rounded-2xl text-xs font-black shadow-lg shadow-indigo-500/20 transition-all active:scale-95">
                            BONUS +20
                        </button>
                        <button onclick="resetIndividualScore('${team}')" class="w-full text-[10px] font-bold text-slate-500 hover:text-red-400 transition-colors uppercase tracking-widest">
                            Reset Team
                        </button>
                    </div>
                </div>
            `;
        });

        async function fetchLatestFromSheet() {
            try {
                const res = await fetch(`${SCRIPT_URL}?cb=${Date.now()}`);
                const data = await res.json();
                data.players.forEach(p => {
                    const el = document.getElementById(`score-${p.name}`);
                    if (el && parseInt(el.innerText) !== p.score) {
                        // Smooth number transition
                        gsap.to(el, {
                            innerText: p.score,
                            duration: 1,
                            snap: { innerText: 1 },
                            ease: "power2.out"
                        });
                    }
                });
                updateStatus("Synced", "bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.6)]");
            } catch (e) {
                updateStatus("Offline", "bg-red-500");
            }
        }

        async function pushUpdate(teamName, points) {
            const el = document.getElementById(`score-${teamName}`);
            const card = document.getElementById(`card-${teamName}`);
            const currentScore = parseInt(el.innerText);
            
            // Visual feedback
            card.classList.add('flash-success');
            setTimeout(() => card.classList.remove('flash-success'), 400);
            
            gsap.to(el, {
                innerText: currentScore + points,
                duration: 0.4,
                snap: { innerText: 1 }
            });
            
            updateStatus("Updating...", "bg-yellow-500");

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({
                        action: "submitScore",
                        user: teamName,
                        points: points
                    })
                });
                updateStatus("Synced", "bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.6)]");
            } catch (e) {
                updateStatus("Error", "bg-red-500");
                fetchLatestFromSheet();
            }
        }

        async function resetIndividualScore(teamName) {
            if(!confirm(`Reset ${teamName} to 0?`)) return;
            const el = document.getElementById(`score-${teamName}`);
            const currentScore = parseInt(el.innerText);
            await pushUpdate(teamName, -currentScore);
        }

        async function resetAllScores() {
            if(!confirm("Are you sure? This will wipe all progress.")) return;
            updateStatus("Resetting...", "bg-red-500 animate-bounce");
            
            for (const team of teams) {
                const el = document.getElementById(`score-${team}`);
                const currentScore = parseInt(el.innerText);
                if (currentScore !== 0) {
                    await fetch(SCRIPT_URL, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify({ action: "submitScore", user: team, points: -currentScore })
                    });
                }
            }
            fetchLatestFromSheet();
        }

        function updateStatus(text, colorClass) {
            const indicator = document.getElementById('sync-indicator');
            document.getElementById('status-text').innerText = text;
            indicator.className = `w-2.5 h-2.5 rounded-full transition-all duration-500 ${colorClass}`;
        }

        // Poll for updates
        setInterval(fetchLatestFromSheet, 5000);
        window.onload = fetchLatestFromSheet;
    </script>
</body>
</html>
