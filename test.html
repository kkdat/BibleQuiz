<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <title>Monitor - Bible Quiz Pro</title>
    <link rel="icon" type="image/png" href="IBMP.png">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #2e1065, #0f172a);
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-glass-effect {
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
            position: relative;
            transition: transform 0.3s ease;
        }
        
        .logo-glass-effect:hover {
            transform: translateY(-2px);
        }

        .reveal-anim { 
            animation: reveal-pop 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        @keyframes reveal-pop {
            0% { transform: scale(0.85) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* --- Animation Styles --- */
        #leaderboard {
            position: relative; /* Necessary for absolute children */
        }

        .player-row {
            position: absolute;
            width: 100%;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            left: 0;
        }

        #leaderboard::-webkit-scrollbar { width: 4px; }
        #leaderboard::-webkit-scrollbar-thumb { background: rgba(167, 139, 250, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="p-8 md:p-16 overflow-hidden">
    
    <div class="flex justify-between items-end mb-16 border-b border-white/10 pb-10">
        <div class="flex items-center gap-6">
            <img src="IBMP.png" alt="Logo" class="w-20 h-20 object-contain logo-glass-effect">
            <div>
                <h1 class="uppercase tracking-[0.4em] font-extrabold text-3xl">
                    <span class="text-purple-400">Balikatan</span> 
                    <span class="text-indigo-400">Bible Quiz</span>
                </h1>
                <div class="flex items-center gap-3 mt-2">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-purple-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-purple-500"></span>
                    </span>
                    <p id="status-tag" class="text-slate-300 font-bold text-xs uppercase tracking-[0.2em]">Live Signal: Encrypted</p>
                </div>
            </div>
        </div>
        <div class="glass px-6 py-3 rounded-2xl flex items-center gap-4">
            <span class="text-slate-300 text-xs font-bold uppercase tracking-widest">Global Status</span>
            <span class="text-emerald-400 font-black text-sm uppercase">Active</span>
        </div>
    </div>

    <div class="grid grid-cols-12 gap-16 h-[65vh] items-start">
        <div class="col-span-8 flex flex-col justify-center h-full relative pr-4">
            <div id="mon-pts" class="mb-6 text-xl text-slate-900 font-black hidden uppercase tracking-[0.3em] bg-purple-300 w-fit px-5 py-1.5 rounded-full border border-purple-400 shadow-lg">
                0 POINTS
            </div>
            
            <div id="mon-q" class="text-6xl md:text-7xl font-extrabold leading-[1.15] text-white transition-all duration-700 ease-out drop-shadow-md">
                Ready for the next Question...
            </div>
            
            <div id="mon-ans-container" class="absolute inset-0 bg-purple-950/90 backdrop-blur-2xl hidden flex-col items-center justify-center text-center p-12 rounded-[3rem] border border-purple-500/40 reveal-anim z-20 shadow-2xl">
                <span class="text-emerald-400 font-bold tracking-[0.4em] uppercase text-sm mb-6 bg-emerald-500/10 px-4 py-1 rounded-full border border-emerald-500/20">Correct Answer</span>
                <div id="mon-ans-text" class="text-7xl md:text-9xl font-black text-white uppercase tracking-tight drop-shadow-[0_0_30px_rgba(168,85,247,0.5)]">
                    ---
                </div>
            </div>
        </div>
        
        <div class="col-span-4 h-full flex flex-col">
            <div class="glass rounded-[2rem] p-8 h-full flex flex-col border-white/5">
                <h2 class="text-white uppercase tracking-widest font-extrabold mb-8 text-sm flex items-center gap-2">
                    <span class="w-2 h-2 bg-purple-500 rounded-full"></span> Top Contenders
                </h2>
                <div id="leaderboard" class="overflow-y-auto pr-4 flex-grow relative">
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOw4fhoiz3QwwrcwczQauBjkvcLaUTlIqtKsNDppU1rIhjLwM1u4apqjuhq3xSqtTq/exec";
        const ROW_HEIGHT = 85; // Pixels per leaderboard item

        async function sync() {
            try {
                const res = await fetch(`${SCRIPT_URL}?cb=${Date.now()}`);
                const data = await res.json();
                
                const qEl = document.getElementById('mon-q');
                const pEl = document.getElementById('mon-pts');
                const ansContainer = document.getElementById('mon-ans-container');
                const ansText = document.getElementById('mon-ans-text');
                const lbContainer = document.getElementById('leaderboard');

                // --- UI Logic ---
                if(data.status === "ACTIVE") {
                    qEl.innerText = data.question;
                    pEl.innerText = data.points + " POINTS";
                    pEl.classList.remove('hidden');
                    qEl.classList.replace('text-white/20', 'text-white');

                    if(data.reveal === true || data.reveal === "true") {
                        ansText.innerText = data.answer;
                        ansContainer.classList.remove('hidden');
                        ansContainer.classList.add('flex');
                    } else {
                        ansContainer.classList.replace('flex', 'hidden');
                    }
                } else {
                    qEl.innerText = "Ready for the next Question...";
                    qEl.classList.add('text-white/20');
                    pEl.classList.add('hidden');
                    ansContainer.classList.add('hidden');
                }

                // --- Re-orderable Leaderboard Logic ---
                if (data.players && data.players.length > 0) {
                    const sortedPlayers = data.players.sort((a, b) => b.score - a.score);
                    const maxScore = Math.max(...sortedPlayers.map(p => p.score), 1);

                    sortedPlayers.forEach((player, idx) => {
                        let playerRow = document.getElementById(`player-${player.name.replace(/\s+/g, '')}`);
                        
                        // Create element if it doesn't exist
                        if (!playerRow) {
                            playerRow = document.createElement('div');
                            playerRow.id = `player-${player.name.replace(/\s+/g, '')}`;
                            playerRow.className = 'player-row space-y-3 group';
                            lbContainer.appendChild(playerRow);
                        }

                        // Update Position and Content
                        playerRow.style.top = `${idx * ROW_HEIGHT}px`;
                        
                        playerRow.innerHTML = `
                            <div class="flex justify-between items-end">
                                <div class="flex items-center gap-3">
                                    <span class="text-xs font-bold text-slate-400">${(idx + 1).toString().padStart(2, '0')}</span>
                                    <span class="font-bold text-xl uppercase tracking-tighter text-white">${player.name}</span>
                                </div>
                                <span class="text-purple-300 font-mono font-bold text-lg">${player.score.toLocaleString()}</span>
                            </div>
                            <div class="h-1.5 bg-white/5 rounded-full overflow-hidden border border-white/5">
                                <div class="h-full bg-gradient-to-r from-purple-500 to-indigo-400 transition-all duration-1000 shadow-[0_0_15px_rgba(168,85,247,0.3)]" 
                                     style="width: ${(player.score / maxScore) * 100}%"></div>
                            </div>
                        `;
                    });
                }
            } catch(e) {
                console.error("Monitor Sync Error:", e);
            }
        }

        setInterval(sync, 1250);
        sync();
    </script>
</body>
</html>
