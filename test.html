<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <title>Player - Bible Quiz Pro</title>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #2e1065, #0f172a);
            min-height: 100vh;
            color: #f8fafc;
        }
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .text-gradient {
            background: linear-gradient(to right, #c084fc, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        .option-btn:active { transform: scale(0.98); }
        .option-btn.selected {
            background: rgba(167, 139, 250, 0.3);
            border-color: #a78bfa;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div id="login-screen" class="max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-gradient">Join the Quiz</h1>
            <p class="text-slate-400 mt-2">Enter your credentials to enter the arena</p>
        </div>
        <div class="glass p-8 rounded-3xl space-y-4">
            <div>
                <label class="text-xs font-bold uppercase tracking-widest text-slate-400">Username</label>
                <input type="text" id="username" placeholder="Your Name" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 outline-none focus:border-purple-500 transition">
            </div>
            <div>
                <label class="text-xs font-bold uppercase tracking-widest text-slate-400">Passcode</label>
                <input type="password" id="passcode" placeholder="••••" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 outline-none focus:border-purple-500 transition text-center tracking-widest">
            </div>
            <button onclick="login()" class="w-full bg-purple-600 hover:bg-purple-500 py-4 rounded-xl font-bold transition shadow-lg shadow-purple-900/40">ENTER LOBBY</button>
        </div>
    </div>

    <div id="main-interface" class="hidden max-w-2xl w-full">
        <header class="flex justify-between items-center mb-8 glass px-6 py-3 rounded-2xl">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-500 to-blue-500 flex items-center justify-center font-bold text-xs" id="user-initial">?</div>
                <span id="display-name" class="font-bold text-sm">Player</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Connected</span>
            </div>
        </header>

        <div id="waiting-room" class="text-center py-20">
            <div class="inline-block p-6 rounded-full bg-purple-500/10 mb-6">
                <span class="text-6xl animate-bounce inline-block">⏳</span>
            </div>
            <h2 class="text-3xl font-black mb-2">Waiting for Admin...</h2>
            <p class="text-slate-400">The next briefcase is about to be opened.</p>
        </div>

        <div id="quiz-area" class="hidden">
            <div class="glass p-8 rounded-[2.5rem] relative overflow-hidden border-purple-500/20">
                <div class="flex justify-between items-center mb-6">
                    <span id="player-points-badge" class="bg-purple-500/20 text-purple-300 text-[10px] font-black px-3 py-1 rounded-full border border-purple-500/30 uppercase tracking-widest">0 Points Stake</span>
                    <span id="player-timer" class="text-2xl font-black tabular-nums">10s</span>
                </div>
                
                <h3 id="player-question" class="text-2xl md:text-3xl font-bold leading-tight mb-8">Loading question...</h3>

                <div id="options-grid" class="grid grid-cols-1 gap-3">
                    <button onclick="submitAnswer('A')" class="option-btn p-5 rounded-2xl text-left font-bold hover:bg-white/10 flex justify-between items-center group">
                        <span>Tap to Submit Response</span>
                        <span class="opacity-0 group-hover:opacity-100 transition">🚀</span>
                    </button>
                </div>

                <div id="feedback" class="hidden mt-6 p-4 rounded-2xl bg-emerald-500/10 border border-emerald-500/20 text-center">
                    <p class="text-emerald-400 font-bold uppercase tracking-widest text-xs">Response Submitted</p>
                    <p class="text-slate-300 text-sm">Awaiting admin reveal...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOw4fhoiz3QwwrcwczQauBjkvcLaUTlIqtKsNDppU1rIhjLwM1u4apqjuhq3xSqtTq/exec";
        let currentUser = null;
        let lastSyncStatus = "INACTIVE";

        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('passcode').value;

            if (user.length < 2) return alert("Enter a valid name");
            if (pass !== "1234") return alert("Invalid Passcode"); // Change '1234' to your desired passcode

            currentUser = user;
            document.getElementById('display-name').innerText = user;
            document.getElementById('user-initial').innerText = user.charAt(0).toUpperCase();
            
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-interface').classList.remove('hidden');

            startSync();
        }

        async function startSync() {
            setInterval(async () => {
                try {
                    const res = await fetch(`${SCRIPT_URL}?cb=${Date.now()}`);
                    const data = await res.json();
                    updateUI(data);
                } catch (e) {
                    console.error("Sync error");
                }
            }, 2000);
        }

        function updateUI(data) {
            const waitingRoom = document.getElementById('waiting-room');
            const quizArea = document.getElementById('quiz-area');
            const questionEl = document.getElementById('player-question');
            const timerEl = document.getElementById('player-timer');
            const pointsEl = document.getElementById('player-points-badge');

            if (data.status === "ACTIVE") {
                waitingRoom.classList.add('hidden');
                quizArea.classList.remove('hidden');
                questionEl.innerText = data.question;
                pointsEl.innerText = data.points + " Points Stake";
                timerEl.innerText = data.timeLeft + "s";
                
                // Reset feedback if a new question starts
                if (lastSyncStatus !== "ACTIVE") {
                    document.getElementById('feedback').classList.add('hidden');
                    document.querySelector('.option-btn').classList.remove('hidden');
                }
            } else {
                waitingRoom.classList.remove('hidden');
                quizArea.classList.add('hidden');
            }
            lastSyncStatus = data.status;
        }

        async function submitAnswer(choice) {
            // This sends the player's name and answer to the Google Sheet backend
            // Only the Admin screen will see the results in the "Players" leaderboard/list
            document.getElementById('feedback').classList.remove('hidden');
            document.querySelector('.option-btn').classList.add('hidden');

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({
                        action: "submitAnswer",
                        playerName: currentUser,
                        answer: "SUBMITTED" // Or choice if you add choices
                    })
                });
            } catch (e) {
                console.log("Submission registered");
            }
        }
    </script>
</body>
</html>
