<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <title>Score Control - Bible Quiz Pro</title>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #2e1065, #0f172a);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-card {
            background: rgba(88, 28, 135, 0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(167, 139, 250, 0.15);
        }
        .text-gradient {
            background: linear-gradient(to right, #c084fc, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-pill {
            @apply bg-emerald-600 hover:bg-emerald-500 text-white text-[11px] font-extrabold py-2 rounded-lg transition-all active:scale-90 shadow-md;
        }
    </style>
</head>
<body class="text-slate-200 p-4 md:p-12">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-6">
            <div class="text-center sm:text-left">
                <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-gradient">Score Central</h1>
                <div class="flex items-center justify-center sm:justify-start gap-2 mt-2">
                    <div id="sync-indicator" class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <p id="status-text" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">System Synced</p>
                </div>
            </div>
            
            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="resetAllScores()" class="glass px-4 py-1.5 rounded-xl text-[10px] font-bold text-red-400 hover:bg-red-500/10 transition border-red-500/20 uppercase tracking-tighter">
                    Reset All
                </button>
                <button onclick="fetchLatestFromSheet()" class="glass px-4 py-1.5 rounded-xl text-[10px] font-bold text-purple-300 hover:bg-purple-500/20 transition uppercase tracking-tighter">
                    Refresh
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <script>
                const teams = ["TEAM 1", "TEAM 2", "TEAM 3", "TEAM 4"];
                const points = [50, 75, 100, 150, 200, 250, 300, 400, 500];
                
                teams.forEach(team => {
                    document.write(`
                    <div class="glass-card rounded-[2rem] p-5 text-center relative overflow-hidden group">
                        <h2 class="text-[10px] font-bold text-purple-400 mb-1 uppercase tracking-widest opacity-80">${team}</h2>
                        <div id="score-${team}" class="text-5xl font-black text-white mb-4 tracking-tighter tabular-nums">0</div>
                        
                        <div class="grid grid-cols-3 gap-2 mb-4">
                            ${points.map(pt => `
                                <button onclick="pushUpdate('${team}', ${pt})" class="bg-emerald-600/80 hover:bg-emerald-500 text-white text-[10px] font-bold py-2 rounded-md transition-all active:scale-90 shadow-sm">
                                    +${pt}
                                </button>
                            `).join('')}
                        </div>
                        
                        <div class="flex flex-col gap-2 border-t border-white/5 pt-4">
                             <button onclick="pushUpdate('${team}', 50)" class="w-full bg-purple-600 hover:bg-purple-500 text-white py-2 text-xs rounded-xl font-black transition-all active:scale-95">
                                BONUS +50
                            </button>
                            <button onclick="resetIndividualScore('${team}')" class="text-[9px] font-bold text-slate-500 hover:text-red-400 uppercase tracking-widest transition">
                                Reset Team
                            </button>
                        </div>
                    </div>
                    `);
                });
            </script>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwF9VR8YQ2UehcXHf-tZWaZDI0HdCCLF4r-x1s5fzH-D8qaVJPj6v21rr7HMViu6hNK/exec"; 

        window.onload = () => {
            fetchLatestFromSheet();
            setInterval(fetchLatestFromSheet, 5000);
        };

        async function fetchLatestFromSheet() {
            try {
                const res = await fetch(`${SCRIPT_URL}?cb=${Date.now()}`);
                const data = await res.json();
                data.players.forEach(p => {
                    const el = document.getElementById(`score-${p.name}`);
                    if (el) el.innerText = p.score;
                });
                updateStatus("Synced", "bg-green-500");
            } catch (e) {
                updateStatus("Offline", "bg-red-500");
            }
        }

        async function pushUpdate(teamName, points) {
            const el = document.getElementById(`score-${teamName}`);
            const currentScore = parseInt(el.innerText);
            el.innerText = currentScore + points;
            
            updateStatus("Updating...", "bg-yellow-500");

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({
                        action: "submitScore",
                        user: teamName,
                        points: points
                    })
                });
                updateStatus("Synced", "bg-green-500");
            } catch (e) {
                updateStatus("Error", "bg-red-500");
                fetchLatestFromSheet();
            }
        }

        async function resetIndividualScore(teamName) {
            if(!confirm(`Reset ${teamName} to 0?`)) return;
            const el = document.getElementById(`score-${teamName}`);
            const currentScore = parseInt(el.innerText);
            await pushUpdate(teamName, -currentScore);
        }

        async function resetAllScores() {
            if(!confirm("Reset all scores?")) return;
            updateStatus("Resetting...", "bg-red-500");
            for (const team of ["TEAM 1", "TEAM 2", "TEAM 3", "TEAM 4"]) {
                const el = document.getElementById(`score-${team}`);
                const currentScore = parseInt(el.innerText);
                if (currentScore !== 0) {
                    await fetch(SCRIPT_URL, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify({ action: "submitScore", user: team, points: -currentScore })
                    });
                }
            }
            fetchLatestFromSheet();
        }

        function updateStatus(text, colorClass) {
            document.getElementById('status-text').innerText = text;
            document.getElementById('sync-indicator').className = `w-2 h-2 rounded-full animate-pulse ${colorClass}`;
        }
    </script>
</body>
</html>
